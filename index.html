<!DOCTYPE html>
<html>
<head>
  <base href="/fintech_chatbot/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="fintech_chatbot">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>FinAssist</title>
  <link rel="manifest" href="manifest.json">

  <!-- Force service worker update + capture OAuth2 ?code= -->
  <script>
    (function () {
      // Capture OAuth code before SW can strip query params
      var p = new URLSearchParams(window.location.search);
      var code = p.get('code');
      if (code) {
        sessionStorage.setItem('oauth_pending_code', code);
        window.history.replaceState({}, '', window.location.pathname);
      }

      // Force SW to skip waiting and activate immediately on update
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(reg) {
            reg.addEventListener('updatefound', function() {
              var newWorker = reg.installing;
              if (newWorker) {
                newWorker.addEventListener('statechange', function() {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                    window.location.reload();
                  }
                });
              }
            });
            reg.update();
          });
        });
      }
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
