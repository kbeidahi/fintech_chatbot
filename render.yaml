services:
  - type: web
    name: fintech-chatbot-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: GEMINI_API_KEY
        value: "AIzaSyARp9mjt0EfNXAjSV6krfeGtUix5mUmYNQ"
      - key: GEMINI_MODEL
        value: "gemini-2.5-flash"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: fintech-db
          property: connectionString

  - type: web
    name: fintech-chatbot-frontend
    runtime: static
    rootDir: flutter_app
    buildCommand: flutter build web --release --dart-define=API_BASE_URL=https://fintech-chatbot-api.onrender.com/api
    staticPublishPath: build/web
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: fintech-db
    databaseName: fintech_chatbot
    user: fintech_user
    plan: free
